<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeLancer</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.6.1/dist/web3.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>DeLancer Platform</h1>
        <div id="userAccount" class="status">Connecting...</div>
    </header>

    <main>
        <section class="action-section">
            <h2>Project Management</h2>
            <div class="button-group">
                <button id="fetchProjectsBtn">Fetch Projects</button>
                <button id="createProjectBtn">Create Project</button>
                <button id="applyProjectBtn">Apply for Project</button>
                <button id="assignFreelancerBtn">Assign Freelancer</button>
                <button id="completeProjectBtn">Complete Project</button>
                <button id="depositFundsBtn">Deposit Funds</button>
                <button id="releaseFundsBtn">Release Funds</button>
            </div>
        </section>

        <section class="display-section">
            <h2>Available Projects</h2>
            <table id="projectTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Employer</th>
                        <th>Freelancer</th>
                        <th>Bid Amount</th>
                        <th>Completed</th>
                        <th>Funds Paid</th>
                        <th>Bids</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>© 2024 DeLancer | Built for Transparency and Trust</p>
    </footer>

    <script src="js/app.js"></script>
</body>

</html>
