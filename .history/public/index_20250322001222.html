<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeLancer</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.6.1/dist/web3.min.js"></script>
    <!-- Add ipfs-http-client -->
    <script src="https://unpkg.com/ipfs-http-client@59.0.0/dist/index.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>DeLancer Platform</h1>
        <div id="userAccount" class="status">Connecting...</div>
    </header>

    <main>
        <!-- Action Buttons Section -->
        <section class="action-section">
            <h2>Project Management</h2>
            <div class="button-group">
                <button id="fetchProjectsBtn">Fetch Projects</button>
                <button id="createProjectBtn">Create Project</button>
                <button id="applyProjectBtn">Apply for Project</button>
                <button id="assignFreelancerBtn">Assign Freelancer</button>
                <button id="depositFundsBtn">Deposit Funds</button>
                <button id="completeProjectBtn">Complete Project</button>
                <button id="releaseFundsBtn">Release Funds</button>
                <button id="markReadyBtn">Mark Ready for Review</button>
                <button id="approveBtn">Approve Project</button>
                <button id="disputeBtn">Dispute Project</button>
                <button id="resubmitBtn">Resubmit Project</button>
                <button id="checkDeadlinesBtn">Check Deadlines</button>
            </div>
        </section>

        <!-- Display Sections -->
        <section class="display-section">
            <h2>Available Projects</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Employer</th>
                        <th>Freelancer</th>
                        <th>Bid Amount (ETH)</th>
                        <th>Completed</th>
                        <th>Applicants</th>
                        <th>Employer File CID</th>
                        <th>Freelancer File CID</th>
                    </tr>
                </thead>
                <tbody id="projectTable"></tbody>
            </table>
        </section>

        <!-- Freelancer Section -->
        <section class="freelancer-section">
            <h2>Freelancers</h2>
            <button id="fetchFreelancersBtn">Fetch Freelancers</button>
            <div id="freelancerTable"></div>
        </section>

        <!-- Removed the non-functional IPFS section since fetching is now in the project table -->
    </main>

    <footer>
        <p>© 2024 DeLancer | Built for Transparency and Trust</p>
    </footer>

    <script src="js/app.js"></script>
</body>

</html>
